name: secretchat
description: "A secure chat application with asymmetric encryption"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # 加密相关
  pointycastle: ^3.9.0
  encrypt: ^5.0.3
  crypto: ^3.0.3
  asn1lib: ^1.5.0
  
  # 状态管理
  provider: ^6.1.1
  get_it: ^9.2.1
  
  # 工具
  file_picker: ^11.0.2
  share_plus: ^12.0.2
  uuid: ^4.3.3
  image_picker: ^1.0.7
  intl: ^0.20.2
  path_provider: ^2.1.2
  path: ^1.8.0
  
  # 二维码
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  
  # UI
  flutter_material_design_icons: ^3.0.0+7447

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
